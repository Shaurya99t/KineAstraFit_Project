services:
  - type: web
    name: ai-fitness-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fitness_postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
    
  - type: postgres
    name: fitness_postgres
    version: "15"
    plan: free

databases:
  - name: fitness_postgres
